; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Docs: https://docs.platformio.org/page/projectconf.html

[env:nodemcu-32s]
platform = espressif32
board = nodemcu-32s
framework = espidf
monitor_speed = 115200
upload_speed = 921600
monitor_filters = esp32_exception_decoder

; ESP32-WROOM-32 has 4MB flash; use a huge single-app partition for headroom
; (bitmaps / future 3-color buffers). No OTA in this milestone.
board_build.flash_size = 4MB
board_build.partitions = partitions.csv

; ---------------------------------------------------------------------------
; Build flags (project tunables; can also live in include/config.h).
; WiFi credentials: keep real values out of git -> move to secrets.ini and
; uncomment `extra_configs` below. The defaults here are placeholders so the
; project stays buildable before secrets.ini exists.
; ---------------------------------------------------------------------------
; WiFi/Scrutiny values are pulled from the [secret] section in secrets.ini
; (git-ignored) via ${secret.*} interpolation. build_flags is defined ONLY
; here so the secret values are guaranteed to reach the compiler.
build_flags =
    '-DWIFI_SSID="Magdalene7"'
    '-DWIFI_PASS="Password is a Joke!"'
    '-DSCRUTINY_API_BASE="http://192.168.66.2:8085/api"'
    -DDISPLAY_PER_DISK_SECONDS=10
    -DFETCH_INTERVAL_SEC=600
    -DHTTP_FETCH_TIMEOUT_MS=10000
    -DMAX_DISKS=16
    -DPARTIAL_REFRESH_BUDGET=20
    -DHTTP_SERVER_PORT=80

; ---------------------------------------------------------------------------
; Display driver / UI library.
; The EPD driver (SSD167x/168x) + EpdGfx (Adafruit_GFX port) live in-tree under
; lib/ and are added once driver porting starts (deferred for now).
; ---------------------------------------------------------------------------
; lib_deps =
;     ; Adafruit_GFX ESP-IDF-compatible port (to be finalized at porting time)
